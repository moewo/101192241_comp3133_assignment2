<mat-toolbar color="primary">
  <span>Employee Manager</span>
  <span class="spacer"></span>
  <button mat-raised-button color="accent" (click)="onAdd()">
    <mat-icon>add</mat-icon> Add Employee
  </button>
  <button mat-button (click)="onLogout()" style="color: white;">
    <mat-icon>logout</mat-icon> Logout
  </button>
</mat-toolbar>

<div class="container">
  <div class="search-bar">
    <mat-form-field appearance="outline">
      <mat-label>Search by Department</mat-label>
      <input matInput [(ngModel)]="searchDepartment" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Search by Position</mat-label>
      <input matInput [(ngModel)]="searchPosition" />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="onSearch()">Search</button>
    <button mat-button (click)="clearSearch()">Clear</button>
  </div>

  <table mat-table [dataSource]="employees" class="mat-elevation-z4 full-width">
    <ng-container matColumnDef="photo">
      <th mat-header-cell *matHeaderCellDef>Photo</th>
      <td mat-cell *matCellDef="let emp">
        <img
          [src]="emp.employee_photo || 'https://ui-avatars.com/api/?name=' + emp.first_name + '+' + emp.last_name + '&background=3f51b5&color=fff'"
          alt="photo"
          class="emp-photo"
        />
      </td>
    </ng-container>

    <ng-container matColumnDef="first_name">
      <th mat-header-cell *matHeaderCellDef>First Name</th>
      <td mat-cell *matCellDef="let emp">{{ emp.first_name }}</td>
    </ng-container>

    <ng-container matColumnDef="last_name">
      <th mat-header-cell *matHeaderCellDef>Last Name</th>
      <td mat-cell *matCellDef="let emp">{{ emp.last_name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let emp">{{ emp.email }}</td>
    </ng-container>

    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let emp">{{ emp.department }}</td>
    </ng-container>

    <ng-container matColumnDef="designation">
      <th mat-header-cell *matHeaderCellDef>Position</th>
      <td mat-cell *matCellDef="let emp">{{ emp.designation }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let emp">
        <button mat-icon-button color="primary" matTooltip="View" (click)="onView(emp.id)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="accent" matTooltip="Edit" (click)="onUpdate(emp.id)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" matTooltip="Delete" (click)="onDelete(emp.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="employees.length === 0" class="no-data">
    No employees found.
  </div>
</div>
